name: 📈 ETF 일일 시세 자동 업데이트

on:
  schedule:
    - cron: '35 6 * * 1-5'
  workflow_dispatch:

concurrency:
  group: price-update
  cancel-in-progress: false

jobs:
  update-and-notify:
    name: 시세 업데이트 & 알림 발송
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📁 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 패키지 설치
        run: |
          pip install --upgrade pip
          pip install FinanceDataReader pandas requests

      - name: 🔄 ETF 시세 업데이트 실행
        id: run_update
        run: |
          python stock_github.py
          echo "status=success" >> $GITHUB_OUTPUT
          echo "run_date=$(TZ='Asia/Seoul' date '+%Y년 %m월 %d일')" >> $GITHUB_OUTPUT
          echo "run_time=$(TZ='Asia/Seoul' date '+%H:%M')" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: 📊 업데이트 결과 확인
        id: check_result
        run: |
          if [ "${{ steps.run_update.outcome }}" == "success" ]; then
            echo "result=✅ 성공" >> $GITHUB_OUTPUT
            echo "result_emoji=✅" >> $GITHUB_OUTPUT
            if [ -f prices.json ]; then
              NEWEST=$(python3 -c "import json; d=json.load(open('prices.json')); keys=sorted(d.keys(),reverse=True); print(keys[0] if keys else 'N/A')")
              COUNT=$(python3 -c "import json; d=json.load(open('prices.json')); print(len(d))")
              echo "newest_date=$NEWEST" >> $GITHUB_OUTPUT
              echo "data_days=$COUNT" >> $GITHUB_OUTPUT
            fi
          else
            echo "result=❌ 실패" >> $GITHUB_OUTPUT
            echo "result_emoji=❌" >> $GITHUB_OUTPUT
            echo "newest_date=N/A" >> $GITHUB_OUTPUT
            echo "data_days=N/A" >> $GITHUB_OUTPUT
          fi

      - name: 💾 변경사항 커밋 & 푸시
        if: steps.run_update.outcome == 'success'
        run: |
          git config --global user.name 'ETF-Bot 🤖'
          git config --global user.email 'actions@github.com'
          git add prices.json ETF_index_Ver3_1.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "변경된 파일 없음"
          else
            KST_DATE=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')
            git commit -m "📈 ETF 시세 자동 업데이트: $KST_DATE"
            git push
          fi

      - name: 📧 이메일 알림 발송
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: "ETF 자동알림 🤖 <${{ secrets.MAIL_USERNAME }}>"
          subject: "${{ steps.check_result.outputs.result_emoji }} ETF 시세 업데이트 — ${{ steps.run_update.outputs.run_date }}"
          body: |
            ✅ ETF 시세 자동 업데이트 결과

            결과: ${{ steps.check_result.outputs.result }}
            일시: ${{ steps.run_update.outputs.run_date }} ${{ steps.run_update.outputs.run_time }} KST
            최신기준일: ${{ steps.check_result.outputs.newest_date }}
            보관데이터: ${{ steps.check_result.outputs.data_days }}일치

            📱 ETF 현황 바로가기:
            https://cison2023.github.io/ETF-1/ETF_index_Ver3_1.html
